version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
        - |
          cat > .env.production << EOF
          APP_AWS_REGION=$APP_AWS_REGION
          DYNAMODB_TABLE_TASKS=$DYNAMODB_TABLE_TASKS
          DYNAMODB_TABLE_APPLICANT=$DYNAMODB_TABLE_APPLICANT
          DYNAMODB_TABLE_PROJECTS=$DYNAMODB_TABLE_PROJECTS
          DYNAMODB_TABLE_STATUS=$DYNAMODB_TABLE_STATUS
          DYNAMODB_TABLE_FLOWS=$DYNAMODB_TABLE_FLOWS
          BUCKET_DESIGN=$BUCKET_DESIGN
          EOF
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
